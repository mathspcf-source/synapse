<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNAPSE | Sala 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0a14;overflow:hidden;height:100vh;width:100vw}
        canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;cursor:grab;z-index:1}
        canvas:active{cursor:grabbing}
        .toolbar-top{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100}
        .btn-top{background:rgba(10,10,20,.9);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:6px 14px;color:#ccc;cursor:pointer;font-size:12px;font-family:inherit;transition:.2s;white-space:nowrap}
        .btn-top:hover{background:#6B4E9E;color:#fff}
        .btn-top.green{background:rgba(76,175,122,.3);border-color:rgba(76,175,122,.5)}.btn-top.green:hover{background:#4CAF7A}
        .btn-top.red{background:rgba(229,115,115,.2);border-color:rgba(229,115,115,.4)}.btn-top.red:hover{background:#c46a5a}
        .toolbar-left{position:fixed;left:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px;z-index:100}
        .btn-left{width:38px;height:38px;border-radius:10px;background:rgba(10,10,20,.9);border:1px solid rgba(255,255,255,.1);color:#ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s}
        .btn-left:hover{background:#6B4E9E;color:#fff}.btn-left.active{background:#6B4E9E;color:#fff}
        .toolbar-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,20,.95);border-top:1px solid rgba(255,255,255,.08);padding:8px 14px;display:flex;align-items:center;gap:5px;justify-content:center;flex-wrap:wrap}
        .btn-bottom{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#ccc;padding:5px 10px;border-radius:12px;cursor:pointer;font-size:11px;font-family:inherit;transition:.2s;white-space:nowrap}
        .btn-bottom:hover{background:#6B4E9E;color:#fff}.btn-bottom.gold{border-color:rgba(230,200,138,.5);color:#e6c88a}.btn-bottom.gold:hover{background:#e6c88a;color:#121212}
        .info-text{position:fixed;top:50px;left:50%;transform:translateX(-50%);color:#e6c88a;font-size:13px;z-index:100;background:rgba(0,0,0,.7);padding:5px 14px;border-radius:15px;pointer-events:none;transition:.3s}
        .count-text{position:fixed;top:10px;right:20px;color:#fff;font-size:12px;z-index:100;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:10px}
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px}.overlay.show{display:flex}
        .overlay i{font-size:50px;color:#4CAF7A}.overlay h2{color:#fff;font-size:20px}.overlay p{color:#aaa;font-size:13px}.overlay button{background:#6B4E9E;color:#fff;padding:10px 24px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-family:inherit;font-size:14px;margin-top:10px}
        .loading-screen{position:fixed;inset:0;background:#0a0a14;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
        .loading-screen .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#e6c88a;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
        .loading-screen p{color:#e6c88a;font-size:14px}
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><p>Carregando Sala 3D...</p></div>
<canvas id="c3d"></canvas>
<div class="info-text" id="infoText">Clique em um boneco para selecionar</div>
<div class="count-text" id="countText">0 membros</div>

<div class="toolbar-top">
    <button class="btn-top green" onclick="finalizarSessao()"><i class="fas fa-check"></i> Finalizar</button>
    <button class="btn-top" onclick="limparTudo()"><i class="fas fa-broom"></i> Limpar</button>
    <button class="btn-top" onclick="organizarCirculo()"><i class="fas fa-circle"></i> Circulo</button>
    <button class="btn-top" onclick="tirarFoto()"><i class="fas fa-camera"></i> Foto</button>
    <button class="btn-top red" onclick="window.close()"><i class="fas fa-times"></i> Sair</button>
</div>

<div class="toolbar-left">
    <button class="btn-left active" id="btnMove" onclick="setMode('move')" title="Mover"><i class="fas fa-arrows-alt"></i></button>
    <button class="btn-left" onclick="desfazer()" title="Desfazer"><i class="fas fa-undo"></i></button>
    <button class="btn-left" onclick="removerSelecionado()" title="Remover"><i class="fas fa-trash-alt"></i></button>
</div>

<div class="toolbar-bottom">
    <span class="btn-bottom gold" onclick="addMembroEspecial('Eu','eu')">⭐ Eu</span>
    <span class="btn-bottom" onclick="addMembroEspecial('Pai','pai')">Pai</span>
    <span class="btn-bottom" onclick="addMembroEspecial('Mae','mae')">Mae</span>
    <span class="btn-bottom" onclick="addMembroEspecial('Filho(a)','filho')">Filho(a)</span>
    <span class="btn-bottom" onclick="addMembroEspecial('Irmao(a)','irmao')">Irmao(a)</span>
    <span class="btn-bottom" onclick="addMembroEspecial('Avo(o)','avo')">Avo(o)</span>
    <span class="btn-bottom" onclick="addMembroManual()">+ Outro</span>
</div>

<div class="overlay" id="overlayFinal"><i class="fas fa-check-circle"></i><h2>Constelacao Finalizada!</h2><p id="overlayMsg"></p><button onclick="voltarAoPainel()"><i class="fas fa-arrow-left"></i> Voltar ao Painel</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

<script>
(function(){var UID=null,ESTADO_INICIAL=null;var p=new URLSearchParams(window.location.search);UID=p.get('uid')||'0';try{ESTADO_INICIAL=JSON.parse(p.get('estado')||'null')}catch(e){ESTADO_INICIAL=null}
function waitForThree(cb){if(typeof THREE!=='undefined'&&THREE.Scene){cb()}else{setTimeout(function(){waitForThree(cb)},100)}}
waitForThree(function(){
document.getElementById('loadingScreen').style.display='none';
var scene=new THREE.Scene();scene.background=new THREE.Color(0x0e0e1a);
var camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,100);camera.position.set(5.5,5.0,6.5);camera.lookAt(0,0.4,0);
var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c3d'),antialias:true,preserveDrawingBuffer:true});renderer.setSize(innerWidth,innerHeight);
var labelRenderer=new THREE.CSS2DRenderer();labelRenderer.setSize(innerWidth,innerHeight);labelRenderer.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:50;';document.body.appendChild(labelRenderer.domElement);
var controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.enablePan=false;controls.target.set(0,0.6,0);
addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight)});
var FR=3.2,SCALE=0.75,membros=[],conexoes=[],historico=[],selecionado=null,modo='move',arrastando=null,contadorNomes={},idCounter=1;
var ground=new THREE.Mesh(new THREE.CircleGeometry(FR+0.3,32),new THREE.MeshStandardMaterial({color:0x2a3a2a,roughness:0.5}));ground.rotation.x=-Math.PI/2;ground.position.y=-0.25;scene.add(ground);
var rp=[];for(var i=0;i<=64;i++){var a=(i/64)*Math.PI*2;rp.push(new THREE.Vector3(Math.cos(a)*FR,0.02,Math.sin(a)*FR))}scene.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(rp),new THREE.LineBasicMaterial({color:0xe6c88a})));
[1.2,2.0,2.7].forEach(function(r){var ri=new THREE.Mesh(new THREE.TorusGeometry(r,0.04,64,200),new THREE.MeshStandardMaterial({color:0xe6c88a,emissive:0x332211}));ri.rotation.x=Math.PI/2;ri.position.y=-0.15;scene.add(ri)});
scene.add(new THREE.AmbientLight(0x4a5a4a,0.6));var lt=new THREE.DirectionalLight(0xfff2dc,1.2);lt.position.set(4,8,3);scene.add(lt);
function getCor(role){switch(role){case'eu':return 0xFFD700;case'pai':return 0x1a3a5c;case'mae':return 0x8B1A4A;case'filho':return 0x4A90D9;case'irmao':return 0x2E7D32;case'avo':return 0x5D4037;default:return 0x6B4E9E}}
function criarBoneco(nome,role){var g=new THREE.Group();var cor=getCor(role);var to=new THREE.Mesh(new THREE.CylinderGeometry(0.21,0.24,0.44,8),new THREE.MeshStandardMaterial({color:cor}));to.position.y=0.22;g.add(to);var hd=new THREE.Mesh(new THREE.SphereGeometry(0.24,24,24),new THREE.MeshStandardMaterial({color:0xF5D0A9}));hd.position.y=0.48;g.add(hd);var em=new THREE.MeshStandardMaterial({color:0x2a1a12}),le=new THREE.Mesh(new THREE.SphereGeometry(0.04,16),em),re=new THREE.Mesh(new THREE.SphereGeometry(0.04,16),em);le.position.set(-0.08,0.56,0.25);re.position.set(0.08,0.56,0.25);g.add(le,re);var ang=Math.random()*Math.PI*2,raio=1.5+Math.random()*1.5;g.position.x=Math.cos(ang)*raio;g.position.z=Math.sin(ang)*raio;g.position.y=-0.2;var div=document.createElement('div');div.style.cssText='background:#1a1a2e;color:#e6c88a;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid #e6c88a;white-space:nowrap';div.textContent=nome;var lb=new THREE.CSS2DObject(div);lb.position.set(0,0.95,0);g.add(lb);g.userData={id:idCounter++,nome:nome,role:role,cor:cor};scene.add(g);return g}
function addMembro(nome,role){if(!contadorNomes[nome])contadorNomes[nome]=0;contadorNomes[nome]++;var nf=contadorNomes[nome]>1?nome+' '+contadorNomes[nome]:nome;var b=criarBoneco(nf,role);membros.push(b);atualizarUI();mostrarMsg(nf+' adicionado(a)');salvarEstado();return b}
function removerMembro(b){var i=membros.indexOf(b);if(i===-1)return;scene.remove(b);membros.splice(i,1);var nc=[];conexoes.forEach(function(c){if(c.a===b||c.b===b){scene.remove(c.linha)}else{nc.push(c)}});conexoes=nc;if(selecionado===b)selecionado=null;atualizarUI();salvarEstado()}
function conectar(a,b){if(a===b)return;var ex=conexoes.find(function(c){return(c.a===a&&c.b===b)||(c.a===b&&c.b===a)});if(ex)return;var pts=[new THREE.Vector3(a.position.x,0.3,a.position.z),new THREE.Vector3(b.position.x,0.3,b.position.z)];var linha=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xe6c88a}));scene.add(linha);conexoes.push({a:a,b:b,linha:linha});salvarEstado()}
function atualizarConexoes(){conexoes.forEach(function(c){if(c.linha){c.linha.geometry.dispose();scene.remove(c.linha)}var pts=[new THREE.Vector3(c.a.position.x,0.3,c.a.position.z),new THREE.Vector3(c.b.position.x,0.3,c.b.position.z)];c.linha=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xe6c88a}));scene.add(c.linha)})}
function atualizarUI(){document.getElementById('countText').textContent=membros.length+' membros'}
function mostrarMsg(msg){var el=document.getElementById('infoText');el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0.5'},2000)}
function highlight(b){membros.forEach(function(m){m.children.forEach(function(c){if(c.isGlow)m.remove(c)})});if(b){var gl=new THREE.Mesh(new THREE.SphereGeometry(0.38,16),new THREE.MeshBasicMaterial({color:0xe6c88a,transparent:true,opacity:0.3}));gl.isGlow=true;gl.position.y=0.44;b.add(gl)}}
function salvarEstado(){if(!UID)return;var estado={membros:membros.map(function(m){return{id:m.userData.id,nome:m.userData.nome,role:m.userData.role,x:m.position.x,z:m.position.z}}),conexoes:conexoes.map(function(c){return{a:c.a.userData.id,b:c.b.userData.id}})};localStorage.setItem('salaEstado_'+UID,JSON.stringify(estado))}
function salvarHistorico(){var snap={membros:membros.map(function(m){return{id:m.userData.id,nome:m.userData.nome,role:m.userData.role,x:m.position.x,z:m.position.z}}),conexoes:conexoes.map(function(c){return{a:c.a.userData.id,b:c.b.userData.id}})};historico.push(snap);if(historico.length>30)historico.shift()}

window.addMembroEspecial=function(nome,role){salvarHistorico();addMembro(nome,role)};
window.addMembroManual=function(){var n=prompt('Nome do membro:');if(n&&n.trim()){salvarHistorico();addMembro(n.trim(),'custom')}};
window.limparTudo=function(){if(!confirm('Limpar todos?'))return;salvarHistorico();while(membros.length>0)removerMembro(membros[0]);mostrarMsg('Circulo limpo')};
window.organizarCirculo=function(){salvarHistorico();membros.forEach(function(m,i){var a=(i/membros.length)*Math.PI*2;m.position.set(Math.cos(a)*2.2,-0.2,Math.sin(a)*2.2)});atualizarConexoes();salvarEstado();mostrarMsg('Circulo organizado')};
window.tirarFoto=function(){renderer.render(scene,camera);var a=document.createElement('a');a.download='constelacao_'+Date.now()+'.png';a.href=renderer.domElement.toDataURL();a.click();mostrarMsg('Foto salva!')};
window.removerSelecionado=function(){if(selecionado){salvarHistorico();removerMembro(selecionado);selecionado=null;highlight(null);mostrarMsg('Removido')}};
window.desfazer=function(){if(!historico.length)return;var ant=historico.pop();while(membros.length>0)removerMembro(membros[0]);var mapa={};ant.membros.forEach(function(d){contadorNomes[d.nome]=(contadorNomes[d.nome]||0)+1;var b=criarBoneco(d.nome,d.role);b.position.set(d.x,-0.2,d.z);membros.push(b);mapa[d.id]=b});ant.conexoes.forEach(function(d){var a=mapa[d.a],b=mapa[d.b];if(a&&b)conectar(a,b)});selecionado=null;highlight(null);atualizarUI();salvarEstado();mostrarMsg('Desfeito')};
window.setMode=function(m){modo=m;document.getElementById('btnMove').classList.toggle('active',m==='move')};
window.finalizarSessao=function(){document.getElementById('overlayMsg').textContent=membros.length+' membros | '+conexoes.length+' conexoes';document.getElementById('overlayFinal').classList.add('show')};
window.voltarAoPainel=function(){if(window.opener&&window.opener.atualizarConstelacoesCB){window.opener.atualizarConstelacoesCB()}localStorage.setItem('sessaoFinalizada_'+UID,'true');localStorage.removeItem('sessaoConstelacao_'+UID);localStorage.removeItem('sessaoInicio_'+UID);localStorage.removeItem('salaEstado_'+UID);window.close()};

var raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
function gm(e){return{x:(e.clientX/innerWidth)*2-1,y:-(e.clientY/innerHeight)*2+1}}
function gi(e){var m=gm(e);mouse.set(m.x,m.y);raycaster.setFromCamera(mouse,camera);var hits=raycaster.intersectObjects(membros,true);if(hits.length>0){var o=hits[0].object;while(o&&membros.indexOf(o)===-1)o=o.parent;return o||null}return null}
renderer.domElement.addEventListener('mousedown',function(e){if(modo!=='move')return;arrastando=gi(e)});
addEventListener('mousemove',function(e){if(!arrastando)return;var m=gm(e);mouse.set(m.x,m.y);raycaster.setFromCamera(mouse,camera);var plano=new THREE.Plane(new THREE.Vector3(0,1,0),-0.2),pt=new THREE.Vector3();if(raycaster.ray.intersectPlane(plano,pt)){var d=Math.sqrt(pt.x*pt.x+pt.z*pt.z);if(d>FR-0.3){var a=Math.atan2(pt.z,pt.x);pt.x=Math.cos(a)*(FR-0.3);pt.z=Math.sin(a)*(FR-0.3)}arrastando.position.x=pt.x;arrastando.position.z=pt.z;atualizarConexoes()}});
addEventListener('mouseup',function(){if(arrastando){salvarHistorico();salvarEstado()}arrastando=null});
renderer.domElement.addEventListener('click',function(e){if(arrastando)return;var o=gi(e);if(o&&modo==='move'){if(selecionado&&selecionado!==o){conectar(selecionado,o);mostrarMsg('Conectado!');selecionado=null;highlight(null)}else{selecionado=o;highlight(o);mostrarMsg(o.userData.nome+' selecionado')}}else{selecionado=null;highlight(null);if(!o)mostrarMsg('Clique em um boneco')}});
renderer.domElement.addEventListener('touchstart',function(e){if(modo!=='move')return;e.preventDefault();arrastando=gi(e.touches[0])},{passive:false});
addEventListener('touchmove',function(e){if(!arrastando)return;e.preventDefault();var m=gm(e.touches[0]);mouse.set(m.x,m.y);raycaster.setFromCamera(mouse,camera);var plano=new THREE.Plane(new THREE.Vector3(0,1,0),-0.2),pt=new THREE.Vector3();if(raycaster.ray.intersectPlane(plano,pt)){var d=Math.sqrt(pt.x*pt.x+pt.z*pt.z);if(d>FR-0.3){var a=Math.atan2(pt.z,pt.x);pt.x=Math.cos(a)*(FR-0.3);pt.z=Math.sin(a)*(FR-0.3)}arrastando.position.x=pt.x;arrastando.position.z=pt.z;atualizarConexoes()}},{passive:false});
addEventListener('touchend',function(){if(arrastando){salvarHistorico();salvarEstado()}arrastando=null});

function animar(){requestAnimationFrame(animar);controls.update();renderer.render(scene,camera);labelRenderer.render(scene,camera)}animar();

if(ESTADO_INICIAL&&ESTADO_INICIAL.membros){var mapa={};ESTADO_INICIAL.membros.forEach(function(d){contadorNomes[d.nome]=(contadorNomes[d.nome]||0)+1;var b=criarBoneco(d.nome,d.role);b.position.set(d.x,-0.2,d.z);membros.push(b);mapa[d.id]=b});if(ESTADO_INICIAL.conexoes){ESTADO_INICIAL.conexoes.forEach(function(d){var a=mapa[d.a],b=mapa[d.b];if(a&&b)conectar(a,b)})}atualizarUI()}
console.log('Sala 3D pronta! UID:',UID);
})})();
</script>
</body>
</html>
