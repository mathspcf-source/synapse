<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse | Terapeuta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
        
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0B0E14 0%, #1A1F2E 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: #0F1219;
            border-radius: 32px;
            padding: 48px;
            width: 400px;
            text-align: center;
            border: 1px solid #2D3748;
        }
        .login-card .logo-icon {
            background: #6B4E9E;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .login-card h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .login-card input {
            width: 100%;
            background: #1A202C;
            border: 1px solid #2D3748;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            color: white;
        }
        .login-card button {
            width: 100%;
            background: #6B4E9E;
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .creator {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #5A6A85;
        }
        
        .dashboard { display: none; padding: 20px; }
        .header {
            background: #14141c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #14141c;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: 700; color: #e6c88a; }
        .stat-label { font-size: 0.7rem; color: #8a99b4; margin-top: 8px; }
        
        .card {
            background: #14141c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e6c88a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #252530;
        }
        th { color: #8a99b4; font-weight: 500; }
        .btn-icon {
            background: transparent;
            border: none;
            color: #6B4E9E;
            cursor: pointer;
            margin: 0 4px;
        }
        .btn-primary {
            background: #6B4E9E;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
        .status-active { background: #4CAF7A; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #6B4E9E;
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="logo-icon"><i class="fas fa-brain" style="font-size: 2rem;"></i></div>
            <h1>SYNAPSE</h1>
            <p>plataforma de constelação familiar</p>
            <input type="email" id="loginEmail" placeholder="E-mail" value="ana@synapse.com">
            <input type="password" id="loginPassword" placeholder="Senha" value="123456">
            <button id="doLoginBtn">Entrar</button>
        </div>
        <div class="creator">Matheus Pacifico Evangelista © 2026</div>
    </div>

    <div id="dashboard" class="dashboard" style="display: none;">
        <div class="header">
            <h2>✦ SYNAPSE</h2>
            <button class="btn-primary" id="logoutBtn">Sair</button>
        </div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="statClientes">0</div><div class="stat-label">Clientes</div></div>
            <div class="stat-card"><div class="stat-number" id="statAgendamentos">0</div><div class="stat-label">Agendamentos</div></div>
            <div class="stat-card"><div class="stat-number" id="statCoins">0</div><div class="stat-label">Synapse Coins</div></div>
            <div class="stat-card"><div class="stat-number" id="statConstelacoes">0</div><div class="stat-label">Constelações</div></div>
        </div>
        
        <div class="card">
            <div class="card-title">📋 Meus Clientes</div>
            <button class="btn-primary" id="btnNovoCliente" style="margin-bottom:16px;">+ Novo Cliente</button>
            <div id="clientesList"></div>
        </div>
        
        <div class="card">
            <div class="card-title">📅 Próximos Agendamentos</div>
            <div id="agendamentosList"></div>
        </div>
        
        <div class="card">
            <div class="card-title">💰 Comprar Synapse Coins</div>
            <div id="pacotesList" style="display: flex; gap: 16px; flex-wrap: wrap;"></div>
        </div>
        
        <div class="card">
            <div class="card-title">📝 Prontuário</div>
            <select id="prontuarioSelect" style="width:100%; padding:10px; background:#1A202C; border:1px solid #2D3748; border-radius:12px; margin-bottom:16px; color:white;"></select>
            <textarea id="prontuarioTexto" rows="4" style="width:100%; background:#1A202C; border:1px solid #2D3748; border-radius:12px; padding:12px; color:white;"></textarea>
            <button class="btn-primary" id="btnSalvarProntuario" style="margin-top:12px;">Salvar Prontuário</button>
        </div>
        
        <div class="card">
            <div class="card-title">💬 Mensagens do Administrador</div>
            <div id="mensagensList"></div>
            <textarea id="novaMensagem" rows="3" style="width:100%; background:#1A202C; border:1px solid #2D3748; border-radius:12px; padding:12px; color:white; margin-top:16px;" placeholder="Digite sua mensagem..."></textarea>
            <button class="btn-primary" id="btnEnviarMsg" style="margin-top:8px;">Enviar Mensagem</button>
        </div>
        
        <div class="card">
            <div class="card-title">🎯 Sala de Constelação</div>
            <button class="btn-primary" id="btnAbrirConstelacao" style="width:100%;">Iniciar Constelação</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://wedhebcoxljyeoxhgaob.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZGhlYmNveGxqeWVveGhnYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTgwNDgsImV4cCI6MjA5MjQ3NDA0OH0._Xnqxp6YSazOK37xP5qSi5gOuThvqGm5Kw_xmWZU8XQ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        async function login(email, senha) {
            const { data, error } = await supabase
                .from('terapeutas')
                .select('*')
                .eq('email', email)
                .eq('senha', senha)
                .single();
            if (error || !data) throw new Error('Credenciais inválidas');
            if (data.is_admin) throw new Error('Use o painel administrativo');
            return data;
        }
        
        async function carregarDados() {
            if (!currentUser) return;
            
            const { data: clientes } = await supabase.from('clientes').select('*').eq('terapeuta_id', currentUser.id);
            document.getElementById('statClientes').innerText = clientes?.length || 0;
            document.getElementById('statCoins').innerText = currentUser.saldo;
            document.getElementById('statConstelacoes').innerText = currentUser.constelacoes;
            
            let html = '<table><thead><tr><th>Nome</th><th>Telefone</th><th>Ações</th></tr></thead><tbody>';
            clientes?.forEach(c => {
                html += `<tr><td>${c.nome}</td><td>${c.telefone || '-'}</td><td><button class="btn-icon" onclick="editarCliente('${c.id}')"><i class="fas fa-edit"></i></button><button class="btn-icon" onclick="excluirCliente('${c.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('clientesList').innerHTML = html;
            
            // Pacotes
            const { data: pacotes } = await supabase.from('pacotes').select('*');
            let pacotesHtml = '';
            pacotes?.forEach(p => {
                pacotesHtml += `<div style="background:#1A202C; padding:16px; border-radius:16px; text-align:center; width:120px;"><div>${p.nome}</div><div style="font-size:1.2rem; font-weight:bold;">${p.qtd} coins</div><div>R$ ${p.valor}</div><button class="btn-primary" onclick="solicitarRecarga('${p.nome}', ${p.qtd}, ${p.valor})" style="margin-top:8px; padding:6px;">Comprar</button></div>`;
            });
            document.getElementById('pacotesList').innerHTML = pacotesHtml;
            
            // Mensagens
            const { data: mensagens } = await supabase.from('mensagens').select('*').eq('terapeuta_id', currentUser.id).order('data', { ascending: false });
            let msgHtml = '';
            mensagens?.forEach(m => {
                msgHtml += `<div style="background:#1A202C; padding:12px; border-radius:12px; margin-bottom:8px;"><strong>${m.is_admin ? '📢 Admin' : '👤 Você'}</strong><br>${m.mensagem}<br><small style="color:#8a99b4;">${new Date(m.data).toLocaleString()}</small></div>`;
            });
            document.getElementById('mensagensList').innerHTML = msgHtml || '<p>Nenhuma mensagem</p>';
        }
        
        window.solicitarRecarga = async (pacote, qtd, valor) => {
            await supabase.from('solicitacoes_recarga').insert({
                terapeuta_id: currentUser.id,
                terapeuta_nome: currentUser.nome,
                pacote_nome: pacote,
                qtd: qtd,
                valor: valor
            });
            showToast('Solicitação enviada! Aguarde aprovação do administrador.');
        };
        
        window.editarCliente = async (id) => {
            const novoNome = prompt('Novo nome:');
            if (novoNome) {
                await supabase.from('clientes').update({ nome: novoNome }).eq('id', id);
                carregarDados();
            }
        };
        
        window.excluirCliente = async (id) => {
            if (confirm('Excluir cliente?')) {
                await supabase.from('clientes').delete().eq('id', id);
                carregarDados();
            }
        };
        
        document.getElementById('btnNovoCliente').onclick = async () => {
            const nome = prompt('Nome do cliente:');
            if (nome) {
                await supabase.from('clientes').insert({ terapeuta_id: currentUser.id, nome });
                carregarDados();
            }
        };
        
        document.getElementById('btnSalvarProntuario').onclick = async () => {
            const clienteId = document.getElementById('prontuarioSelect').value;
            const texto = document.getElementById('prontuarioTexto').value;
            if (clienteId) {
                await supabase.from('prontuarios').upsert({ terapeuta_id: currentUser.id, cliente_id: clienteId, observacoes: texto });
                showToast('Prontuário salvo');
            }
        };
        
        document.getElementById('btnEnviarMsg').onclick = async () => {
            const msg = document.getElementById('novaMensagem').value;
            if (msg) {
                await supabase.from('mensagens').insert({ terapeuta_id: currentUser.id, terapeuta_nome: currentUser.nome, mensagem: msg });
                document.getElementById('novaMensagem').value = '';
                carregarDados();
                showToast('Mensagem enviada');
            }
        };
        
        document.getElementById('btnAbrirConstelacao').onclick = () => {
            window.location.href = 'constelacao.html';
        };
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginPassword').value;
            try {
                currentUser = await login(email, senha);
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                await carregarDados();
            } catch (err) {
                alert(err.message);
            }
        };
        
        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        };
        
        // Carregar clientes no select do prontuário
        async function carregarClientesSelect() {
            const { data } = await supabase.from('clientes').select('id, nome').eq('terapeuta_id', currentUser?.id);
            const select = document.getElementById('prontuarioSelect');
            if (select && data) {
                select.innerHTML = '<option value="">Selecione um cliente</option>' + data.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            }
        }
        
        setInterval(() => { if (currentUser) carregarClientesSelect(); }, 1000);
    </script>
</body>
</html>
