<!DOCTYPE html>
<html>
<head>
    <title>Teste Login SYNAPSE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Teste de Login</h2>
    <input type="text" id="email" placeholder="Email" value="admin@synapse.com">
    <input type="password" id="senha" placeholder="Senha" value="admin123">
    <button onclick="testarLogin()">Login</button>
    <div id="resultado"></div>

    <script>
        const SUPABASE_URL = 'https://wedhebcoxljyeoxhgaob.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZGhlYmNveGxqeWVveGhnYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTgwNDgsImV4cCI6MjA5MjQ3NDA0OH0._Xnqxp6YSazOK37xP5qSi5gOuThvqGm5Kw_xmWZU8XQ';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function testarLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const resultado = document.getElementById('resultado');
            
            resultado.innerHTML = 'Buscando usuário...';
            
            try {
                // Buscar o usuário pelo email
                const { data, error } = await sb
                    .from('terapeutas')
                    .select('*')
                    .eq('email', email);
                
                console.log('Resposta:', { data, error });
                
                if (error) {
                    resultado.innerHTML = `ERRO NA CONSULTA: ${error.message}`;
                    return;
                }
                
                if (!data || data.length === 0) {
                    resultado.innerHTML = `❌ Usuário ${email} não encontrado no banco!`;
                    return;
                }
                
                const usuario = data[0];
                
                if (usuario.senha === senha && usuario.status === 'ativo') {
                    resultado.innerHTML = `✅ LOGIN OK! Bem-vindo ${usuario.nome}<br>ID: ${usuario.id}<br>Saldo: ${usuario.saldo} coins`;
                } else {
                    resultado.innerHTML = `❌ Senha incorreta!<br>Senha no banco: ${usuario.senha}<br>Senha digitada: ${senha}`;
                }
                
            } catch (err) {
                resultado.innerHTML = `ERRO: ${err.message}`;
            }
        }
    </script>
</body>
</html>
