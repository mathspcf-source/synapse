<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
        
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0B0E14 0%, #1A1F2E 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: #0F1219;
            border-radius: 32px;
            padding: 48px;
            width: 400px;
            text-align: center;
            border: 1px solid #2D3748;
        }
        .login-card .logo-icon {
            background: #6B4E9E;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .login-card h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .login-card input {
            width: 100%;
            background: #1A202C;
            border: 1px solid #2D3748;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            color: white;
        }
        .login-card button {
            width: 100%;
            background: #6B4E9E;
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .creator {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #5A6A85;
        }
        
        .dashboard { display: none; padding: 24px; }
        .header {
            background: #14141c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #14141c;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: 700; color: #e6c88a; }
        .stat-label { font-size: 0.7rem; color: #8a99b4; margin-top: 8px; }
        
        .card {
            background: #14141c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e6c88a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #252530;
        }
        th { color: #8a99b4; font-weight: 500; }
        .btn-icon {
            background: transparent;
            border: none;
            color: #6B4E9E;
            cursor: pointer;
            margin: 0 4px;
        }
        .btn-primary {
            background: #6B4E9E;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
        .status-active { background: #4CAF7A; }
        .status-pending { background: #FF9800; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #6B4E9E;
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="logo-icon"><i class="fas fa-brain" style="font-size: 2rem;"></i></div>
            <h1>SYNAPSE ADMIN</h1>
            <p>painel administrativo</p>
            <input type="email" id="adminEmail" placeholder="E-mail" value="admin@synapse.com">
            <input type="password" id="adminPassword" placeholder="Senha" value="admin123">
            <button id="adminLoginBtn">Entrar</button>
        </div>
        <div class="creator">Matheus Pacifico Evangelista © 2026</div>
    </div>

    <div id="adminDashboard" class="dashboard" style="display: none;">
        <div class="header">
            <h2>✦ SYNAPSE ADMIN</h2>
            <button class="btn-primary" id="logoutAdminBtn">Sair</button>
        </div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalTerapeutas">0</div><div class="stat-label">Terapeutas</div></div>
            <div class="stat-card"><div class="stat-number" id="totalClientes">0</div><div class="stat-label">Clientes</div></div>
            <div class="stat-card"><div class="stat-number" id="totalSessoes">0</div><div class="stat-label">Sessões</div></div>
            <div class="stat-card"><div class="stat-number" id="totalReceita">R$ 0</div><div class="stat-label">Receita</div></div>
        </div>
        
        <div class="card">
            <div class="card-title">📋 Terapeutas</div>
            <button class="btn-primary" id="btnNovoTerapeuta" style="margin-bottom:16px;">+ Novo Terapeuta</button>
            <div id="terapeutasList"></div>
        </div>
        
        <div class="card">
            <div class="card-title">🔄 Solicitações de Recarga</div>
            <div id="solicitacoesList"></div>
        </div>
        
        <div class="card">
            <div class="card-title">💬 Mensagens dos Terapeutas</div>
            <div id="mensagensList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://wedhebcoxljyeoxhgaob.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZGhlYmNveGxqeWVveGhnYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTgwNDgsImV4cCI6MjA5MjQ3NDA0OH0._Xnqxp6YSazOK37xP5qSi5gOuThvqGm5Kw_xmWZU8XQ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentAdmin = null;
        
        async function adminLogin(email, senha) {
            const { data, error } = await supabase
                .from('terapeutas')
                .select('*')
                .eq('email', email)
                .eq('senha', senha)
                .single();
            if (error || !data) throw new Error('Credenciais inválidas');
            if (!data.is_admin) throw new Error('Acesso apenas para administrador');
            return data;
        }
        
        async function carregarStats() {
            const { data: terapeutas } = await supabase.from('terapeutas').select('*');
            const { data: clientes } = await supabase.from('clientes').select('*');
            const { data: recargas } = await supabase.from('recargas').select('*');
            
            document.getElementById('totalTerapeutas').innerText = terapeutas?.filter(t => !t.is_admin).length || 0;
            document.getElementById('totalClientes').innerText = clientes?.length || 0;
            const totalReceita = recargas?.reduce((sum, r) => sum + r.valor, 0) || 0;
            document.getElementById('totalReceita').innerHTML = `R$ ${totalReceita.toFixed(2)}`;
        }
        
        async function carregarTerapeutas() {
            const { data } = await supabase.from('terapeutas').select('*').order('created_at', { ascending: false });
            if (!data) return;
            
            let html = '<table><thead><tr><th>Nome</th><th>E-mail</th><th>Saldo</th><th>Status</th><th>Ações</th></tr></thead><tbody>';
            data.forEach(t => {
                if (t.is_admin) return;
                html += `<tr>
                    <td>${t.nome}</td>
                    <td>${t.email}</td>
                    <td>${t.saldo} coins</span></td>
                    <td><span class="status-badge ${t.status === 'ativo' ? 'status-active' : ''}">${t.status}</span></td>
                    <td>
                        <button class="btn-icon" onclick="toggleStatus('${t.id}', '${t.status}')"><i class="fas ${t.status === 'ativo' ? 'fa-ban' : 'fa-check-circle'}"></i></button>
                        <button class="btn-icon" onclick="adicionarCredito('${t.id}')"><i class="fas fa-plus-circle"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('terapeutasList').innerHTML = html;
        }
        
        async function carregarSolicitacoes() {
            const { data } = await supabase.from('solicitacoes_recarga').select('*').eq('status', 'pendente');
            if (!data || data.length === 0) {
                document.getElementById('solicitacoesList').innerHTML = '<p>Nenhuma solicitação pendente</p>';
                return;
            }
            
            let html = '<table><thead><tr><th>Data</th><th>Terapeuta</th><th>Pacote</th><th>Coins</th><th>Valor</th><th>Ações</th></tr></thead><tbody>';
            data.forEach(s => {
                html += `<tr>
                    <td>${s.data_solicitacao}</td>
                    <td>${s.terapeuta_nome}</td>
                    <td>${s.pacote_nome}</td>
                    <td>${s.qtd}</td>
                    <td>R$ ${s.valor.toFixed(2)}</span></td>
                    <td>
                        <button class="btn-icon" onclick="aprovarRecarga('${s.id}', '${s.terapeuta_id}', ${s.qtd})"><i class="fas fa-check-circle"></i></button>
                        <button class="btn-icon" onclick="recusarRecarga('${s.id}')"><i class="fas fa-times-circle"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('solicitacoesList').innerHTML = html;
        }
        
        async function carregarMensagens() {
            const { data } = await supabase.from('mensagens').select('*').eq('is_admin', false).order('data', { ascending: false });
            if (!data || data.length === 0) {
                document.getElementById('mensagensList').innerHTML = '<p>Nenhuma mensagem</p>';
                return;
            }
            
            let html = '<tr><thead><tr><th>Data</th><th>Terapeuta</th><th>Mensagem</th><th>Ações</th></tr></thead><tbody>';
            data.forEach(m => {
                html += `<tr>
                    <td>${new Date(m.data).toLocaleDateString()}</td>
                    <td>${m.terapeuta_nome}</td>
                    <td style="max-width:300px;">${m.mensagem}</td>
                    <td><button class="btn-icon" onclick="responderMensagem('${m.terapeuta_id}', '${m.terapeuta_nome}')"><i class="fas fa-reply"></i></button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('mensagensList').innerHTML = html;
        }
        
        window.toggleStatus = async (id, statusAtual) => {
            const novoStatus = statusAtual === 'ativo' ? 'inativo' : 'ativo';
            await supabase.from('terapeutas').update({ status: novoStatus }).eq('id', id);
            carregarTerapeutas();
            showToast(`Status alterado`);
        };
        
        window.adicionarCredito = async (id) => {
            const qtd = prompt('Quantos Synapse Coins adicionar?', '30');
            if (qtd && !isNaN(qtd)) {
                const { data: terapeuta } = await supabase.from('terapeutas').select('nome').eq('id', id).single();
                await supabase.from('recargas').insert({
                    terapeuta_id: id,
                    pacote: 'Crédito Manual',
                    qtd: parseInt(qtd),
                    valor: 0,
                    status: 'aprovada'
                });
                await supabase.from('terapeutas').update({ saldo: supabase.raw(`saldo + ${qtd}`) }).eq('id', id);
                carregarTerapeutas();
                showToast(`${qtd} Synapse Coins adicionados`);
            }
        };
        
        window.aprovarRecarga = async (solicitacaoId, terapeutaId, qtd) => {
            await supabase.from('solicitacoes_recarga').update({ status: 'aprovada' }).eq('id', solicitacaoId);
            await supabase.from('recargas').insert({
                terapeuta_id: terapeutaId,
                pacote: (await supabase.from('solicitacoes_recarga').select('pacote_nome').eq('id', solicitacaoId).single()).data.pacote_nome,
                qtd: qtd,
                valor: (await supabase.from('solicitacoes_recarga').select('valor').eq('id', solicitacaoId).single()).data.valor,
                status: 'aprovada'
            });
            await supabase.from('terapeutas').update({ saldo: supabase.raw(`saldo + ${qtd}`) }).eq('id', terapeutaId);
            carregarSolicitacoes();
            carregarTerapeutas();
            showToast('Recarga aprovada');
        };
        
        window.recusarRecarga = async (id) => {
            await supabase.from('solicitacoes_recarga').update({ status: 'recusada' }).eq('id', id);
            carregarSolicitacoes();
            showToast('Solicitação recusada');
        };
        
        window.responderMensagem = (terapeutaId, terapeutaNome) => {
            const resposta = prompt('Digite sua resposta:');
            if (resposta) {
                supabase.from('mensagens').insert({
                    terapeuta_id: terapeutaId,
                    terapeuta_nome: terapeutaNome,
                    mensagem: resposta,
                    is_admin: true
                });
                showToast('Resposta enviada');
                carregarMensagens();
            }
        };
        
        document.getElementById('btnNovoTerapeuta').onclick = async () => {
            const nome = prompt('Nome do terapeuta:');
            const email = prompt('E-mail:');
            const senha = prompt('Senha:');
            if (nome && email && senha) {
                await supabase.from('terapeutas').insert({ nome, email, senha, saldo: 0 });
                carregarTerapeutas();
                carregarStats();
                showToast('Terapeuta adicionado');
            }
        };
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        async function carregarTudo() {
            await carregarStats();
            await carregarTerapeutas();
            await carregarSolicitacoes();
            await carregarMensagens();
        }
        
        document.getElementById('adminLoginBtn').onclick = async () => {
            const email = document.getElementById('adminEmail').value;
            const senha = document.getElementById('adminPassword').value;
            try {
                currentAdmin = await adminLogin(email, senha);
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                await carregarTudo();
            } catch (err) {
                alert(err.message);
            }
        };
        
        document.getElementById('logoutAdminBtn').onclick = () => {
            currentAdmin = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        };
    </script>
</body>
</html>
